<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinite Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Infinite Tic Tac Toe</h1>

<!-- MENU SCREEN -->

<div id="menu">

<h2>Select Mode</h2>

<button id="single">Single Player</button>
<button id="multi">Multiplayer</button>

<div id="aiOptions" style="display:none">

<h3>AI Move Order</h3>

<button id="aiFirst">AI First</button>
<button id="aiSecond">AI Second</button>

</div>

</div>


<!-- GAME SCREEN -->

<div id="game" style="display:none">

<div class="controls">

<button id="restart">Restart</button>
<button id="back">Back to Menu</button>

</div>

<div id="status">Player X Turn</div>

<div id="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

</div>

</div>

<script src="gameLogic.js" defer></script>
<script src="ai.js" defer></script>
<script src="ui.js" defer></script>
<script src="main.js" defer></script>

</body>
</html>
